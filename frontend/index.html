<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudyMate AI — Tanya Materi Kuliahmu</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">SM</span>
      <span class="brand-name">StudyMate<em>AI</em></span>
    </div>
    <p class="brand-tagline">Upload materi, tanya langsung, jawaban bersumber dari catatanmu sendiri.</p>
  </header>

  <main class="layout">

    <!-- KOLOM KIRI: Upload & daftar mata kuliah -->
    <section class="panel panel-upload">
      <h2 class="panel-title">01 — Materi</h2>

      <form id="upload-form">
        <label class="field">
          <span>Mata kuliah</span>
          <input type="text" id="subject-input" placeholder="cth: Aljabar Linear" required />
        </label>

        <label class="field">
          <span>File (.pdf atau .txt)</span>
          <input type="file" id="file-input" accept=".pdf,.txt" required />
        </label>

        <button type="submit" id="upload-btn">Unggah & Proses</button>
        <p id="upload-status" class="status"></p>
      </form>

      <div class="subject-list">
        <h3>Mata kuliah tersimpan</h3>
        <ul id="subject-list"></ul>
      </div>
    </section>

    <!-- KOLOM KANAN: Chat -->
    <section class="panel panel-chat">
      <h2 class="panel-title">02 — Tanya Jawab</h2>

      <label class="field field-inline">
        <span>Filter mata kuliah</span>
        <select id="subject-filter">
          <option value="">Semua mata kuliah</option>
        </select>
      </label>

      <div id="chat-window" class="chat-window">
        <div class="chat-empty">Belum ada percakapan. Upload materi dulu, lalu tanya apa saja di sini.</div>
      </div>

      <form id="chat-form" class="chat-form">
        <input type="text" id="question-input" placeholder="cth: Apa itu eigenvalue?" required />
        <button type="submit">Tanya</button>
      </form>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
